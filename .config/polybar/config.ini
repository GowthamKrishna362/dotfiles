[colors]
background = "#24283b"
background-transparent = #CC1a1b26
background-alt = #28344a
foreground = #a9b1d6
primary = #7aa2f7
secondary = #7dcfff
success = #73daca
alert = #f7768e
warn = #e0af68
disabled = #545c7e
label = #ffc600            

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 30px
radius = 15px

font-0 = JetBrainsMono Nerd Font:size=12:weight=bold;2

background = ${colors.background}
foreground = ${colors.foreground}

border-left-size = 30px
border-right-size = 30px
border-top-size = 5pt
border-size = 0pt

line-size = 0pt
padding-right = 2
padding-left = 0
module-margin = 1

separator = |
separator-foreground = ${colors.disabled}


modules-left = xworkspaces  
modules-center = date
modules-right =  battery bluetooth pulseaudio brightness wireless-network

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/wireless-network]
type = internal/network
interface = wlp0s20f3
label-connected = %essid% 

format-connected = <ramp-signal>  
ramp-signal-foreground = ${colors.primary}
format-disconnected = %{F#ff0000}Disconnected
interval = 2
ramp-signal-0 = ’ć½

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "’Ć©  "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}



[module/battery]
type = internal/battery
format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}
full-at = 99
format-charging = <animation-charging> <label-charging>
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750
animation-charging-foreground = ${colors.label}
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
ramp-capacity-foreground = ${colors.primary}
low-at = 10
battery = BAT0
adapter = ACAD
poll-interval = 5

[module/date]
type = internal/date
interval = 1

date = %a %d %b %I:%M %p
date-alt = %I:%M %p

format-foreground = ${colors.primary}
format-prefix = "’ü│  "
label = %date%
label-foreground = ${colors.foreground}

[module/brightness]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
poll-interval = 0
interval = 1
enable-scroll = true
scroll-interval = 10
format-prefix = "¾░āĀ "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/bluetooth]
type = custom/script
exec = bluetoothctl show | grep -q "Powered: yes" && (name=$(bluetoothctl info | grep 'Name' | cut -d ' ' -f 2-); battery=$(upower -i $(upower -e | grep "battery_BAT") | grep percentage | awk '{print $2}'); [ -z "$name" ] && echo "¾░é▓ No Device" || echo "$name($battery)") || echo "¾░é▓ Off"
interval = 10
format-foreground = ${colors.foreground}
format-prefix = "’Ŗō "
format-prefix-foreground = ${colors.primary}
label = %output%

[settings]
screenchange-reload = true
pseudo-transparency = true
